services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      DB_URL: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME}
      DB_USERNAME: ${DB_USER}
      DB_PASSWORD: ${DB_PASS}
    ports:
      - "${BACKEND_PORT}:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile.dev
    restart: unless-stopped
    env_file: .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
    ports:
      - "${FRONTEND_PORT}:5173"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const s=require('net').connect(5173,'127.0.0.1',()=>process.exit(0));s.on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

  announce:
    image: alpine
    restart: "no"
    env_file: .env
    depends_on:
      frontend:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        echo ""
        echo "============================================"
        echo "  Flights Aviation  —  Dev Server Ready"
        echo ""
        echo "  Local:   http://localhost:${FRONTEND_PORT}"
        echo "  Network: http://${HOST_IP}:${FRONTEND_PORT}"
        echo ""
        echo "  API:     http://localhost:${BACKEND_PORT}"
        echo "============================================"
        echo ""
