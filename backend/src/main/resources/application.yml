spring:
  application:
    name: FlightBooking_API
  datasource:
    url: jdbc:h2:mem:flight-booking-dev;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.zaxxer.hikari: warn
    org.hibernate.SQL: warn
    org.hibernate.orm.connections.pooling: warn
    org.hibernate.orm.deprecation: error
    org.hibernate.orm.core: warn
    org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean: warn
    org.springframework.data.jpa.repository.query.QueryEnhancerFactories: warn

springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

app:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - "*"
    allow-credentials: true
