spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/flight_booking_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.zaxxer.hikari: warn
    org.hibernate.SQL: warn
    org.hibernate.orm.connections.pooling: warn
    org.hibernate.orm.deprecation: error
    org.hibernate.orm.core: warn
    org.springframework.orm.jpa.LocalContainerEntityManagerFactoryBean: warn
    org.springframework.data.jpa.repository.query.QueryEnhancerFactories: warn
